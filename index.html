<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polio — Librairie</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --ink: #0d0b08; --parchment: #f5f0e8; --cream: #faf7f2;
      --gold: #b8902a; --gold-light: #d4a843; --rust: #8b3a2a;
      --muted: #6b6357; --border: rgba(184,144,42,0.25);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--ink); overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; z-index: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; }

    /* FERMETURE */
    #closed-overlay { position: fixed; inset: 0; z-index: 9999; background: var(--parchment); display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
    #closed-overlay .lock-icon { font-family: 'Cinzel', serif; font-size: 4rem; color: var(--gold); margin-bottom: 2rem; border: 1px solid var(--border); width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; }
    #closed-overlay h2 { font-family: 'Cormorant Garamond', serif; font-size: 3rem; color: var(--ink); margin-bottom: 1rem; }
    #closed-overlay p { font-family: 'Jost', sans-serif; color: var(--muted); max-width: 40ch; line-height: 1.6; }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 1.2rem 4rem; background: rgba(245,240,232,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .nav-logo { font-family: 'Cinzel', serif; font-size: 1.4rem; letter-spacing: 0.3em; color: var(--ink); text-transform: uppercase; }
    .nav-logo span { color: var(--gold); }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a { font-family: 'Jost', sans-serif; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.25s; }
    .nav-links a:hover { color: var(--gold); }

    /* HERO */
    #hero { position: relative; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: flex-start; padding: 8rem 4rem 4rem; overflow: hidden; }
    .hero-bg-text { position: absolute; right: -2rem; top: 50%; transform: translateY(-50%) rotate(-90deg); font-family: 'Cinzel', serif; font-size: clamp(6rem, 18vw, 16rem); font-weight: 600; color: transparent; -webkit-text-stroke: 1px rgba(184,144,42,0.12); white-space: nowrap; pointer-events: none; user-select: none; }
    .hero-eyebrow { font-size: 0.7rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem; }
    .hero-eyebrow::before { content: ''; display: inline-block; width: 2.5rem; height: 1px; background: var(--gold); }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(3.5rem, 8vw, 7rem); font-weight: 300; line-height: 1.0; color: var(--ink); max-width: 14ch; margin-bottom: 2rem; }
    h1 em { font-style: italic; color: var(--gold); }
    .hero-desc { font-size: 1rem; font-weight: 300; line-height: 1.8; color: var(--muted); max-width: 44ch; margin-bottom: 3rem; }
    .btn-primary { display: inline-flex; align-items: center; gap: 0.8rem; background: var(--ink); color: var(--parchment); font-family: 'Jost', sans-serif; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; text-decoration: none; padding: 1rem 2.5rem; border: none; cursor: pointer; transition: background 0.3s, transform 0.2s; }
    .btn-primary:hover { background: var(--gold); transform: translateY(-2px); }
    .btn-outline { display: inline-flex; align-items: center; gap: 0.8rem; background: transparent; color: var(--ink); font-family: 'Jost', sans-serif; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; text-decoration: none; padding: 1rem 2.5rem; border: 1px solid var(--ink); cursor: pointer; transition: all 0.3s; }
    .btn-outline:hover { background: var(--ink); color: var(--parchment); }
    .hero-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
    .hero-scroll-hint { position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 0.5rem; font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--muted); }
    .scroll-line { width: 1px; height: 3rem; background: linear-gradient(to bottom, var(--gold), transparent); animation: scrollPulse 2s ease-in-out infinite; }
    @keyframes scrollPulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

    section { position: relative; z-index: 1; }
    .section-label { font-size: 0.65rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    .section-label::before { content: ''; display: inline-block; width: 2rem; height: 1px; background: var(--gold); }
    .section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 4vw, 3.5rem); font-weight: 300; line-height: 1.1; margin-bottom: 1.5rem; }

    /* CREDITS */
    #credits { background: var(--ink); color: var(--parchment); padding: 6rem 4rem; }
    .credits-inner { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; }
    #credits .section-label { color: var(--gold-light); }
    #credits .section-title { color: var(--parchment); }
    #credits p { font-weight: 300; line-height: 1.8; color: rgba(245,240,232,0.65); margin-bottom: 2rem; }
    .credits-form { display: flex; flex-direction: column; gap: 1rem; }
    .credits-input-wrap input { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(184,144,42,0.3); color: var(--parchment); font-family: 'Jost', sans-serif; font-size: 0.9rem; padding: 1rem 1.5rem; letter-spacing: 0.1em; outline: none; transition: border-color 0.3s; }
    .credits-input-wrap input::placeholder { color: rgba(245,240,232,0.3); }
    .credits-input-wrap input:focus { border-color: var(--gold); }
    .btn-gold { background: var(--gold); color: var(--ink); font-family: 'Jost', sans-serif; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; padding: 1rem 2rem; border: none; cursor: pointer; transition: background 0.3s, transform 0.2s; align-self: flex-start; }
    .btn-gold:hover { background: var(--gold-light); transform: translateY(-2px); }
    .credits-result { display: none; background: rgba(184,144,42,0.12); border: 1px solid rgba(184,144,42,0.3); padding: 1.5rem; margin-top: 0.5rem; }
    .credits-result.visible { display: block; }
    .credits-result .client-name { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 300; color: var(--parchment); margin-bottom: 0.5rem; }
    .credits-result .credit-count { font-size: 2.5rem; font-family: 'Cinzel', serif; color: var(--gold); }
    .credits-result .credit-label { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(245,240,232,0.5); }
    .credits-error { display: none; color: #e07060; font-size: 0.85rem; padding: 0.75rem 0; }
    .credits-error.visible { display: block; }
    .btn-recharge { display: inline-flex; align-items: center; gap: 0.5rem; background: transparent; color: var(--gold); border: 1px solid rgba(184,144,42,0.4); font-family: 'Jost', sans-serif; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; padding: 0.7rem 1.4rem; cursor: pointer; transition: all 0.25s; align-self: flex-start; }
    .btn-recharge:hover { background: rgba(184,144,42,0.15); border-color: var(--gold); }

    /* CATALOGUE */
    #catalogue { padding: 7rem 4rem; background: var(--parchment); }
    .catalogue-header { max-width: 1100px; margin: 0 auto 4rem; }
    .catalogue-grid { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2.5rem; }
    .book-card { position: relative; background: var(--cream); border: 1px solid var(--border); overflow: hidden; transition: transform 0.35s, box-shadow 0.35s; }
    .book-card:hover { transform: translateY(-6px); box-shadow: 0 20px 50px rgba(13,11,8,0.12); }
    .book-cover { position: relative; width: 100%; aspect-ratio: 3/4; display: flex; flex-direction: column; justify-content: flex-end; overflow: hidden; padding: 2rem 1.8rem; }
    .book-cover-pattern { position: absolute; inset: 0; opacity: 0.15; }
    .cover-elite { background: linear-gradient(160deg, #1a1208 0%, #2d1f0a 50%, #0d0b08 100%); }
    .cover-elite .book-cover-pattern { background-image: repeating-linear-gradient(45deg, transparent, transparent 12px, rgba(184,144,42,0.3) 12px, rgba(184,144,42,0.3) 13px), repeating-linear-gradient(-45deg, transparent, transparent 12px, rgba(184,144,42,0.15) 12px, rgba(184,144,42,0.15) 13px); }
    .cover-coming1 { background: linear-gradient(160deg, #1a0d0d 0%, #2a1515 100%); }
    .cover-coming2 { background: linear-gradient(160deg, #0d1520 0%, #142030 100%); }
    .cover-coming3 { background: linear-gradient(160deg, #151208 0%, #251e0c 100%); }
    .book-cover-ornament { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 4rem; opacity: 0.08; user-select: none; }
    .book-cover-title { position: relative; z-index: 1; font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 300; font-style: italic; color: var(--gold); line-height: 1.2; margin-bottom: 0.5rem; }
    .book-cover-author { position: relative; z-index: 1; font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(245,240,232,0.45); }
    .book-badge { position: absolute; top: 1rem; right: 1rem; z-index: 2; font-size: 0.6rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; padding: 0.35rem 0.75rem; }
    .badge-available { background: var(--gold); color: var(--ink); }
    .badge-soon { background: rgba(245,240,232,0.12); color: rgba(245,240,232,0.5); border: 1px solid rgba(245,240,232,0.15); backdrop-filter: blur(4px); }
    .book-info { padding: 1.5rem 1.8rem 1.8rem; }
    .book-info h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 400; margin-bottom: 0.4rem; }
    .book-info .author { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.05em; margin-bottom: 0.8rem; }
    .book-info .description { font-size: 0.82rem; line-height: 1.7; color: var(--muted); font-weight: 300; margin-bottom: 1.2rem; }
    .book-footer { display: flex; align-items: center; justify-content: space-between; }
    .book-credits .number { font-family: 'Cinzel', serif; font-size: 1.4rem; color: var(--gold); }
    .book-credits .label { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
    .book-status-text { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-style: italic; }
    .btn-buy { display: inline-flex; align-items: center; gap: 0.5rem; background: var(--gold); color: var(--ink); font-family: 'Jost', sans-serif; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; padding: 0.65rem 1.4rem; border: none; cursor: pointer; transition: background 0.25s, transform 0.2s; }
    .btn-buy:hover { background: var(--gold-light); transform: translateY(-1px); }

    /* HOW */
    #how { padding: 7rem 4rem; background: var(--cream); }
    .how-inner { max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 2fr; gap: 6rem; align-items: start; }
    .how-steps { display: flex; flex-direction: column; }
    .how-step { display: flex; gap: 1.5rem; padding: 2rem 0; border-bottom: 1px solid var(--border); }
    .step-number { font-family: 'Cinzel', serif; font-size: 2.2rem; font-weight: 400; color: var(--border); min-width: 2.5rem; line-height: 1; transition: color 0.3s; }
    .how-step:hover .step-number { color: var(--gold); }
    .step-content h4 { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 400; margin-bottom: 0.5rem; }
    .step-content p { font-size: 0.85rem; line-height: 1.75; color: var(--muted); font-weight: 300; }

    /* CONTACT */
    #contact { padding: 7rem 4rem; background: var(--parchment); }
    .contact-inner { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.2fr; gap: 5rem; align-items: start; }
    .contact-info p { font-size: 0.9rem; line-height: 1.8; color: var(--muted); font-weight: 300; margin-bottom: 2rem; }
    .contact-detail { display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1.2rem; }
    .contact-detail-icon { width: 2rem; height: 2rem; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.85rem; flex-shrink: 0; }
    .contact-detail-text { font-size: 0.85rem; line-height: 1.6; color: var(--muted); }
    .contact-detail-text strong { display: block; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); font-weight: 500; margin-bottom: 0.2rem; }
    .contact-detail-text a { color: var(--ink); text-decoration: none; transition: color 0.25s; }
    .contact-detail-text a:hover { color: var(--gold); }
    .contact-form { display: flex; flex-direction: column; gap: 1.2rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .form-group label { font-size: 0.62rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); font-weight: 500; }
    .form-group input, .form-group textarea, .form-group select { background: var(--cream); border: 1px solid var(--border); color: var(--ink); font-family: 'Jost', sans-serif; font-size: 0.88rem; font-weight: 300; padding: 0.9rem 1.2rem; outline: none; transition: border-color 0.3s; resize: none; appearance: none; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--gold); }
    .form-group textarea { min-height: 120px; line-height: 1.7; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-success { display: none; background: rgba(184,144,42,0.1); border: 1px solid rgba(184,144,42,0.3); padding: 1.2rem 1.5rem; font-size: 0.85rem; color: var(--gold); }
    .form-success.visible { display: block; }

    /* FOOTER */
    footer { background: var(--ink); color: rgba(245,240,232,0.4); padding: 2.5rem 4rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; border-top: 1px solid rgba(184,144,42,0.2); }
    .footer-logo { font-family: 'Cinzel', serif; font-size: 1rem; letter-spacing: 0.3em; color: var(--parchment); }
    .footer-logo span { color: var(--gold); }
    footer p { font-size: 0.72rem; letter-spacing: 0.1em; }
    footer a { color: var(--gold); text-decoration: none; font-size: 0.72rem; }
    .ornamental-divider { text-align: center; font-size: 0.9rem; color: var(--gold); opacity: 0.5; letter-spacing: 0.5em; padding: 0 4rem; overflow: hidden; }
    .ornamental-divider::before, .ornamental-divider::after { content: ''; display: inline-block; vertical-align: middle; width: 30%; height: 1px; background: var(--border); margin: 0 1.5rem; }

    /* ANIMATIONS */
    .fade-up { opacity: 0; transform: translateY(30px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .fade-up.visible { opacity: 1; transform: none; }

    /* MODAL ACHAT */
    #buy-overlay { position: fixed; inset: 0; z-index: 1000; background: rgba(13,11,8,0.78); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; padding: 1.5rem; }
    #buy-overlay.open { display: flex; }
    #buy-modal { background: var(--parchment); border: 1px solid var(--border); width: 100%; max-width: 480px; padding: 2.5rem 2.8rem; position: relative; animation: modalIn 0.3s ease; max-height: 90vh; overflow-y: auto; }
    @keyframes modalIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
    #buy-modal .modal-close { position: absolute; top: 1rem; right: 1.2rem; background: none; border: none; cursor: pointer; font-size: 1.3rem; color: var(--muted); transition: color 0.2s; }
    #buy-modal .modal-close:hover { color: var(--ink); }
    .modal-eyebrow { font-size: 0.6rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); display: flex; align-items: center; gap: 0.7rem; margin-bottom: 0.6rem; }
    .modal-eyebrow::before { content: ''; display: inline-block; width: 1.5rem; height: 1px; background: var(--gold); }
    #buy-modal h3 { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 300; color: var(--ink); margin-bottom: 0.4rem; }
    .modal-book-info { font-size: 0.78rem; color: var(--muted); letter-spacing: 0.05em; margin-bottom: 1.8rem; padding-bottom: 1.4rem; border-bottom: 1px solid var(--border); }
    .modal-book-info strong { color: var(--gold); font-family: 'Cinzel', serif; }
    .buy-step { display: none; flex-direction: column; gap: 1rem; }
    .buy-step.active { display: flex; }
    .buy-step label { font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); font-weight: 500; }
    .buy-step input, .buy-step select { background: var(--cream); border: 1px solid var(--border); color: var(--ink); font-family: 'Jost', sans-serif; font-size: 0.9rem; font-weight: 300; padding: 0.85rem 1.1rem; outline: none; transition: border-color 0.3s; width: 100%; appearance: none; }
    .buy-step input:focus, .buy-step select:focus { border-color: var(--gold); }
    .modal-err { color: #c0503a; font-size: 0.82rem; background: rgba(192,80,58,0.08); border: 1px solid rgba(192,80,58,0.25); padding: 0.7rem 1rem; display: none; }
    .modal-err.show { display: block; }
    .modal-info-box { background: rgba(184,144,42,0.1); border: 1px solid var(--border); padding: 1rem 1.2rem; font-size: 0.83rem; line-height: 1.65; color: var(--ink); }
    .modal-info-box .big { font-family: 'Cinzel', serif; font-size: 1.6rem; color: var(--gold); display: block; margin-bottom: 0.15rem; }
    .modal-info-box .sub { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
    .modal-ok { color: #4a7c59; font-weight: 500; font-size: 0.82rem; }
    
    .modal-warn { color: #c0503a; font-weight: 500; font-size: 0.82rem; }
    .modal-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 0.5rem; }
    .btn-modal-primary { flex: 1; background: var(--ink); color: var(--parchment); font-family: 'Jost', sans-serif; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; padding: 0.85rem 1.4rem; border: none; cursor: pointer;
